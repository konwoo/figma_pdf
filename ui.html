<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 16px;
      background: #fff;
    }

    h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #18181b;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: #555;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: #fafafa;
      outline: none;
    }
    select:focus { border-color: #7c3aed; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .checkbox-row input { width: 16px; height: 16px; }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #btn-export {
      background: #7c3aed;
      color: #fff;
    }
    #btn-export:hover { background: #6d28d9; }
    #btn-export:disabled { background: #c4b5fd; cursor: not-allowed; }

    #btn-cancel {
      background: #f3f4f6;
      color: #555;
    }
    #btn-cancel:hover { background: #e5e7eb; }

    #progress-wrap {
      display: none;
      margin-bottom: 12px;
    }

    .progress-outer {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #7c3aed;
      transition: width 0.2s;
      border-radius: 4px;
    }

    #progress-text {
      display: block;
      text-align: right;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    #status-text {
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 18px;
    }

    .info {
      margin-top: 16px;
      padding: 10px;
      background: #f5f3ff;
      border-radius: 6px;
      font-size: 11px;
      color: #6d28d9;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>Figma to PDF</h2>

  <div class="field">
    <label for="select-fit">배치 방식</label>
    <select id="select-fit">
      <option value="fill" selected>채우기 (비율 유지, 페이지 가득)</option>
      <option value="fit">맞추기 (비율 유지, 잘리지 않음)</option>
      <option value="stretch">늘리기 (비율 무시, 페이지 가득)</option>
    </select>
  </div>

  <div class="field">
    <label for="select-scale">해상도</label>
    <select id="select-scale">
      <option value="1" selected>1x (기본)</option>
      <option value="2">2x</option>
      <option value="3">3x</option>
      <option value="4">4x</option>
    </select>
  </div>

  <div class="field">
    <label for="select-margin">여백 (mm)</label>
    <select id="select-margin">
      <option value="0" selected>없음</option>
      <option value="5">5mm</option>
      <option value="10">10mm</option>
      <option value="15">15mm</option>
      <option value="20">20mm</option>
    </select>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="chk-selected" checked />
    <label for="chk-selected" style="margin-bottom:0">선택한 레이어만 내보내기</label>
  </div>

  <div class="btn-group">
    <button id="btn-export">PDF 내보내기</button>
    <button id="btn-cancel">닫기</button>
  </div>

  <div id="progress-wrap">
    <div class="progress-outer">
      <div id="progress-bar"></div>
    </div>
    <span id="progress-text"></span>
  </div>

  <p id="status-text"></p>

  <div class="info">
    💡 팁: Figma에서 레이어를 선택한 후 "PDF 내보내기"를 누르면<br/>
    각 레이어가 A4 페이지로 변환되어 하나의 PDF로 다운로드됩니다.
  </div>

  <script src="ui.bundle.js"></script>
</body>
</html>
